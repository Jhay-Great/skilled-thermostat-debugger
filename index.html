<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Manrope Font Embeded -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />
    <link rel="shortcut icon" href="./assets/point.svg" type="image/x-icon">

    <!-- Animate CSS -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />

    <!-- JS -->
    <script src="./main.js" defer></script>

    <title>Smart Home | Thermostat Widget</title>
  </head>
  <body>
    <div class="main-container">
      <div class="container animate__animated animate__fadeInUp">
        <div class="top-content">
          <h1 class="logo">Thermostat</h1>
          <select id="rooms">
            
          </select>
          <button  id="add-room-btn" class="add-room-btn">
            <ion-icon name="add-outline" class="add-room-icon"></ion-icon>
          </button>
          <!-- Add to HTML -->

<audio id="acSound" preload="auto">
  <source src="./assets/audio/kitchen.mp3" type="audio/mpeg">

</audio>
        </div>
        <!-- Interior card -->
        <div class="room">
          <div class="text">
            <h3 class="room-name">Living Room</h3>
            <p class="currentTemp">27°</p>
          </div>
        </div>
        <div class="main-content">
          <div class="temperature">
            <svg
              class="point"
              width="44"
              height="44"
              viewBox="0 0 44 44"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <circle
                cx="22"
                cy="22"
                r="19.5"
                fill="#515155"
                stroke="white"
                stroke-width="5"
              />
              <circle cx="21.5" cy="21.5" r="9.5" fill="#FFD7A8" />
            </svg>

            <div class="info">
              <p>Current Temp</p>
              <h1 id="temp"></h1>
            </div>
          </div>

          <div class="controls">
            <p>Set Temperature</p>
            <div class="buttons">
              <button id="reduce">
                <ion-icon size="large" name="remove-outline"></ion-icon>
              </button>
              <button id="increase">
                <ion-icon size="large" name="add-outline"></ion-icon>
              </button>
            </div>
          </div>

          <div class="default-settings">
            <button id="cool">
              <ion-icon size="large" name="snow-outline"></ion-icon>
              Cool
            </button>
            <button id="warm">
              <ion-icon size="large" name="leaf"></ion-icon>
              warm
            </button>
          </div>

          <div class="configure">
            <button id="newPreset">
              <ion-icon name="cog"></ion-icon>Configure Presets
            </button>
          </div>

          <div class="inputs hidden">
            <input
              id="coolInput"
              type="number"
              min="10"
              max="22"
              placeholder="Cool"
            />
            <input
              id="warmInput"
              type="number"
              min="22"
              max="32"
              placeholder="Warm"
            />
            <button id="save">Save</button>
            <button id="close"><ion-icon name="close"></ion-icon></button>

            <span class="error"></span>
          </div>
        </div>
      </div>
      <div class="toggle-wrapper">

        <div
        class="container rooms-control animate__animated animate__fadeIn"
        >
        
      </div>
      <div class="toggle-container">
        <span>AC Power:</span>
        <label class="toggle-switch">
          <input type="checkbox" id="ac-power-toggle">
          <span class="toggle-slider"></span>
        </label>
        <span class="status-indicator"></span>
      </div>
      
      
    </div>
    
  </div>
  <div class="modal hidden" id="addRoomModal">
    <div class="modal-content">
      <h3>Add New Room</h3>
    <input type="text" id="newRoomName" placeholder="Room name">
    <button id="confirmAddRoom">Add</button>
    <button id="cancelAddRoom">Cancel</button>
    </div>
  </div>
    <!-- Ionicons -->
     <!-- SweetAlert2 CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">

<!-- SweetAlert2 JS -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
  </body>
</html>
